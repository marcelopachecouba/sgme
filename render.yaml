services:
  - type: web
    name: sgme-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn app:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.2"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSLMODE
        value: require
      - key: DATABASE_HOSTADDR
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: REQUIRE_SECRET_KEY
        value: "1"
      - key: PUBLIC_BASE_URL
        sync: false
      - key: PIX_PROVIDER
        value: mock
      - key: PIX_CHAVE
        value: "01172466000480"
      - key: PIX_MERCHANT_NAME
        value: SGME
      - key: PIX_MERCHANT_CITY
        value: SAO PAULO
      - key: PIX_API_KEY
        sync: false
      - key: PIX_ACCESS_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: RIFA_VALOR_UNITARIO
        value: "10"
      - key: RIFA_TOTAL_NUMEROS
        value: "1000"
      - key: RIFA_RESERVA_MINUTOS
        value: "30"
      - key: RIFA_PDF_DIR
        value: instance/rifas
      - key: RIFA_UPLOAD_DIR
        value: static/uploads/rifas
      - key: SCHEDULER_TIMEZONE
        value: America/Sao_Paulo
      - key: WHATSAPP_TOKEN
        sync: false
      - key: PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_GRAPH_VERSION
        value: v19.0
      - key: WHATSAPP_SEND_MODE
        value: template
      - key: WHATSAPP_TEMPLATE_NAME
        sync: false
      - key: WHATSAPP_TEMPLATE_LANGUAGE
        value: pt_BR
      - key: WHATSAPP_TEMPLATE_BUTTON_URL
        sync: false
      - key: FIREBASE_CREDENTIALS
        sync: false
      - key: FIREBASE_VAPID_KEY
        sync: false
