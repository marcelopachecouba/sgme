{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Nova Disponibilidade</h2>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-warning">{{ message }}</div>
        {% endfor %}
    {% endif %}
{% endwith %}

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST" class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Ministro</label>
                <select name="ministro" class="form-select" required>
                    {% for m in ministros %}
                    <option value="{{ m.id }}">{{ m.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Tipo de Regra</label>
                <select name="tipo_regra" id="tipo_regra" class="form-select" required>
                    <option value="fixa">Fixa (semana/dia)</option>
                    <option value="pontual">Data especifica</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Horario (opcional)</label>
                <input
                    type="text"
                    name="horario"
                    class="form-control"
                    placeholder="19:30"
                    pattern="^([0-1][0-9]|2[0-3]):[0-5][0-9]$"
                    title="Use o formato HH:MM"
                >
                <small class="text-muted">Deixe vazio para todos os horarios.</small>
            </div>

            <div id="bloco_fixa" class="row g-3 m-0 p-0">
                <div class="col-md-3">
                    <label class="form-label">Semana</label>
                    <select name="semana" class="form-select">
                        <option value="">Todas</option>
                        <option value="1">1a semana</option>
                        <option value="2">2a semana</option>
                        <option value="3">3a semana</option>
                        <option value="4">4a semana</option>
                        <option value="5">5a semana</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Dia da Semana</label>
                    <select name="dia_semana" class="form-select">
                        <option value="0">Segunda</option>
                        <option value="1">Terca</option>
                        <option value="2">Quarta</option>
                        <option value="3">Quinta</option>
                        <option value="4">Sexta</option>
                        <option value="5">Sabado</option>
                        <option value="6">Domingo</option>
                    </select>
                </div>
            </div>

            <div id="bloco_pontual" class="row g-3 m-0 p-0" style="display:none;">
                <div class="col-md-4">
                    <label class="form-label">Data Especifica</label>
                    <input type="date" name="data_especifica" class="form-control">
                </div>
            </div>

            <div class="col-12 d-flex gap-2">
                <button type="submit" class="btn btn-success">Salvar</button>
                <a href="{{ url_for('indisponibilidade.listar_indisponibilidade') }}" class="btn btn-secondary">Voltar</a>
            </div>
        </form>
    </div>
</div>

<script>
(() => {
    const tipo = document.getElementById("tipo_regra");
    const blocoFixa = document.getElementById("bloco_fixa");
    const blocoPontual = document.getElementById("bloco_pontual");

    const atualizar = () => {
        const pontual = tipo.value === "pontual";
        blocoFixa.style.display = pontual ? "none" : "";
        blocoPontual.style.display = pontual ? "" : "none";
    };

    tipo.addEventListener("change", atualizar);
    atualizar();
})();
</script>

{% endblock %}
