{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Mapa de Disponibilidade</h2>

<table class="table table-bordered text-center">

<thead class="table-dark">

<tr>
<th>Ministro</th>
<th>SEG</th>
<th>TER</th>
<th>QUA</th>
<th>QUI</th>
<th>SEX</th>
<th>SAB</th>
<th>DOM</th>
</tr>

</thead>

<tbody>

{% for m in mapa %}

<tr>

<td class="text-start"><b>{{ m.nome }}</b></td>

{% for d in m.dias %}
<td style="font-size:20px">{{ d }}</td>
{% endfor %}

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
