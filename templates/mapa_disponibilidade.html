{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Mapa de Disponibilidade</h2>

<style>

.celula-mapa{
    font-weight:bold;
    font-size:20px;
    cursor:pointer;
    transition:0.2s;
}

.disponivel{
    background:#dcfce7;
    color:#166534;
}

.indisponivel{
    background:#fee2e2;
    color:#991b1b;
}

.celula-mapa:hover{
    transform:scale(1.1);
}

</style>

<table class="table table-bordered text-center">

<thead class="table-dark">

<tr>
<th>Ministro</th>
<th>SEG</th>
<th>TER</th>
<th>QUA</th>
<th>QUI</th>
<th>SEX</th>
<th>SAB</th>
<th>DOM</th>
</tr>

</thead>

<tbody>

{% for m in mapa %}

<tr>

<td class="text-start"><b>{{ m.nome }}</b></td>

{% for d in m.dias %}
<td
class="celula-mapa {% if d == 'X' %}indisponivel{% else %}disponivel{% endif %}"
data-ministro="{{ m.id }}"
data-dia="{{ loop.index0 }}"
>
{{ d }}
</td>
{% endfor %}

</tr>

{% endfor %}

</tbody>

</table>


<script>

document.addEventListener("DOMContentLoaded", function(){

document.querySelectorAll(".celula-mapa").forEach(celula => {

    celula.addEventListener("click", function(){

        const ministro_id = this.dataset.ministro
        const dia_semana = this.dataset.dia

        fetch("/api/toggle_indisponibilidade", {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify({
                ministro_id:ministro_id,
                dia_semana:dia_semana
            })

        })

        .then(r=>r.json())

        .then(resp=>{

            if(this.innerText.trim()=="✔"){

                this.innerText="X"

                this.classList.remove("disponivel")
                this.classList.add("indisponivel")

            }

            else{

                this.innerText="✔"

                this.classList.remove("indisponivel")
                this.classList.add("disponivel")

            }

        })

    })

})

})

</script>

{% endblock %}
