{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Mapa de Disponibilidade</h2>

<style>
.celula-mapa{
    font-weight:bold;
    font-size:20px;
    cursor:pointer;
    transition:0.2s;
    min-width:90px;
}

.disponivel{
    background:#dcfce7;
    color:#166534;
}

.indisponivel{
    background:#fee2e2;
    color:#991b1b;
}

.celula-mapa:hover{
    transform:scale(1.05);
}
</style>

<div class="table-responsive">
<table class="table table-bordered text-center align-middle">
<thead class="table-dark">
<tr>
<th>Ministro</th>
{% for coluna in colunas %}
<th>{{ coluna.dia_label }}<br><small>{{ coluna.horario }}</small></th>
{% endfor %}
</tr>
</thead>
<tbody>
{% for m in mapa %}
<tr>
<td class="text-start"><b>{{ m.nome }}</b></td>
{% for celula in m.celulas %}
<td
class="celula-mapa {% if celula.simbolo == 'X' %}indisponivel{% else %}disponivel{% endif %}"
data-ministro="{{ m.id }}"
data-dia="{{ celula.dia_semana }}"
data-horario="{{ celula.horario }}"
>
{{ celula.simbolo }}
</td>
{% endfor %}
</tr>
{% endfor %}
</tbody>
</table>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  document.querySelectorAll(".celula-mapa").forEach((celula) => {
    celula.addEventListener("click", function () {
      fetch("/api/toggle_indisponibilidade", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          ministro_id: this.dataset.ministro,
          dia_semana: Number(this.dataset.dia),
          horario: this.dataset.horario
        })
      })
      .then((r) => r.json())
      .then(() => {
        if (this.innerText.trim() === "O") {
          this.innerText = "X";
          this.classList.remove("disponivel");
          this.classList.add("indisponivel");
        } else {
          this.innerText = "O";
          this.classList.remove("indisponivel");
          this.classList.add("disponivel");
        }
      });
    });
  });
});
</script>

{% endblock %}
