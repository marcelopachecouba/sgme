{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-4">

        <div class="card shadow">
            <div class="card-header text-center">
                Login
            </div>
            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label>Login</label>
                        <input type="text"
                               name="login"
                               class="form-control"
                               placeholder="Email, CPF ou Telefone"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Senha</label>
                        <input type="password"
                               name="senha"
                               class="form-control"
                               required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Entrar
                    </button>

                    <div class="text-center mt-3">
                       <a href="{{ url_for('auth.cadastro') }}">
                           Não tem conta? Cadastre-se
                       </a>
                   </div>

                </form>

                <div class="text-center mt-3">
                    <a href="{{ url_for('reset_senha') }}">
                        Esqueci minha senha
                    </a>
                </div>

            </div>
        </div>

    </div>
</div>

{% endblock %}
