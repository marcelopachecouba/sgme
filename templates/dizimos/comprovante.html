{% extends "base.html" %}

{% block content %}

<div class="container">

<h3>

Cadastro de Dizimista

</h3>

<form method="POST">

<div class="row">

<div class="col-md-6">

<label>Nome</label>

<input

name="nome"

class="form-control"

required>

</div>

<div class="col-md-3">

<label>CPF</label>

<input

name="cpf"

class="form-control"

required>

</div>

<div class="col-md-3">

<label>Telefone</label>

<input

name="telefone"

class="form-control">

</div>

</div>

<br>

<div class="row">

<div class="col-md-3">

<label>Whatsapp</label>

<input

name="whatsapp"

class="form-control">

</div>

<div class="col-md-4">

<label>Email</label>

<input

name="email"

class="form-control">

</div>

<div class="col-md-2">

<label>CEP</label>

<input

name="cep"

class="form-control">

</div>

<div class="col-md-3">

<label>Cidade</label>

<input

name="cidade"

class="form-control">

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>Endereço</label>

<input

name="endereco"

class="form-control">

</div>

<div class="col-md-2">

<label>Número</label>

<input

name="numero"

class="form-control">

</div>

<div class="col-md-4">

<label>Bairro</label>

<input

name="bairro"

class="form-control">

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>Comunidade</label>

<select

name="comunidade_id"

class="form-control">

{% for c in comunidades %}

<option value="{{ c.id }}">

{{ c.nome }}

</option>

{% endfor %}

</select>

</div>

</div>

<br>

<button

class="btn btn-success">

Salvar

</button>

<a

href="{{ url_for('contribuicoes.dizimistas') }}"

class="btn btn-secondary">

Cancelar

</a>

</form>

</div>

{% endblock %}
