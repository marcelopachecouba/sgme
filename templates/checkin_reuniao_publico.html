<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in da Reuniao</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 720px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h2 class="mb-2">Confirmacao de Presenca</h2>
            <p class="text-muted mb-4">
                {{ reuniao.data.strftime('%d/%m/%Y') }} -
                {{ "Formacao" if reuniao.tipo == "formacao" else "Reuniao" }} -
                {{ reuniao.assunto }}
            </p>

            <div class="mb-3">
                <strong>Ministro:</strong> {{ ministro.nome }}
            </div>

            <div id="status" class="alert alert-info">
                Tentando obter sua localizacao para confirmar a presenca...
            </div>

            <div class="d-flex gap-2 flex-wrap">
                <button id="btn-checkin" class="btn btn-success">Tentar novamente</button>
            </div>
        </div>
    </div>
</div>

<script>
async function enviarLocalizacao(latitude, longitude) {
  const resposta = await fetch("{{ url_for('presencas.checkin_reuniao_publico_localizacao', reuniao_id=reuniao.id, token_publico=ministro.token_publico) }}", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ latitude, longitude })
  });

  const dados = await resposta.json();
  const box = document.getElementById("status");

  if (dados.ok) {
    box.className = "alert alert-success";
    box.textContent = dados.mensagem;
  } else {
    box.className = "alert alert-warning";
    box.textContent = dados.mensagem || "Nao foi possivel confirmar a presenca.";
  }
}

function iniciarCheckin() {
  const box = document.getElementById("status");
  box.className = "alert alert-info";
  box.textContent = "Obtendo localizacao...";

  if (!navigator.geolocation) {
    box.className = "alert alert-warning";
    box.textContent = "Seu aparelho nao suporta geolocalizacao.";
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (posicao) => {
      enviarLocalizacao(posicao.coords.latitude, posicao.coords.longitude);
    },
    () => {
      box.className = "alert alert-warning";
      box.textContent = "Nao foi possivel obter sua localizacao.";
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

document.getElementById("btn-checkin").addEventListener("click", iniciarCheckin);
window.addEventListener("load", iniciarCheckin);
</script>
</body>
</html>
