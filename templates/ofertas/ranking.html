{% extends "base.html" %}

{% block content %}

<div class="container-fluid mt-3">

<div class="card">

<div class="card-header bg-success text-white">

<h4>🏆 Ranking das Comunidades</h4>

</div>

<div class="card-body">

<form method="POST">

<div class="row">

<div class="col-md-3">

<label>Data Inicial</label>

<input
type="date"
name="data_inicial"
value="{{ data_inicial }}"
class="form-control">

</div>

<div class="col-md-3">

<label>Data Final</label>

<input
type="date"
name="data_final"
value="{{ data_final }}"
class="form-control">

</div>

<div class="col-md-2">

<br>

<button
class="btn btn-success">

Pesquisar

</button>

</div>

</div>

</form>

<hr>

<table class="table table-striped table-bordered">

<thead>

<tr>

<th>Posição</th>

<th>Comunidade</th>

<th>Qtd PIX</th>

<th>Total</th>

</tr>

</thead>

<tbody>

{% for c in ranking %}

<tr>

<td>{{ loop.index }}º</td>

<td>{{ c.nome }}</td>

<td>{{ c.qtd_pix }}</td>

<td>

R$ {{ "%.2f"|format(c.total or 0) }}

</td>

</tr>

{% endfor %}

</tbody>

<tfoot>

<tr class="table-success">

<th colspan="3">

TOTAL GERAL

</th>

<th>

R$ {{ "%.2f"|format(total_geral) }}

</th>

</tr>

</tfoot>

</table>

</div>

</div>

</div>

{% endblock %}
