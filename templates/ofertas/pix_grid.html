<table class="table table-striped table-bordered">

<thead class="table-success">

<tr>

<th>Descrição</th>

<th>Tipo</th>

<th>TXID</th>

<th>Chave PIX</th>

<th>Status</th>

<th width="220">

Ações

</th>

</tr>

</thead>

<tbody>

{% for p in pix %}

<tr>

<td>{{ p.descricao }}</td>

<td>{{ p.tipo.descricao }}</td>

<td>{{ p.txid }}</td>

<td>{{ p.chave_pix }}</td>

<td>

{% if p.ativo %}

<span class="badge bg-success">

Ativo

</span>

{% else %}

<span class="badge bg-danger">

Inativo

</span>

{% endif %}

</td>

<td>

<a

href="{{ url_for('ofertas.editar_pix',id=p.id) }}"

class="btn btn-warning btn-sm">

✏️

</a>

<a

href="{{ url_for('ofertas.excluir_pix',id=p.id) }}"

class="btn btn-danger btn-sm">

🗑️

</a>

<a

href="{{ url_for('ofertas.gerar_qrcode',id=p.id) }}"

class="btn btn-success btn-sm">

📷

</a>

<a

href="{{ url_for('ofertas.imprimir_qrcode',id=p.id) }}"

target="_blank"

class="btn btn-primary btn-sm">

🖨️

</a>

</td>

</tr>

{% endfor %}

{% if pix|length==0 %}

<tr>

<td colspan="6" class="text-center">

Nenhum PIX cadastrado.

</td>

</tr>

{% endif %}

</tbody>

</table>
