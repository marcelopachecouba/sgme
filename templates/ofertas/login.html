{% extends "base.html" %}

{% block content %}

<div class="container py-3" style="max-width:450px">

    <!-- LOGO -->

    <div class="text-center mb-4">

        <img
            src="{{ url_for('static', filename='img/logo_paroquia.png') }}"
            class="img-fluid rounded-circle shadow"
            style="max-height:110px">

        <h4 class="mt-3 text-danger">

            Matriz Nossa Senhora Aparecida

        </h4>

       <!-- <div class="text-muted">

            Portal Financeiro Paroquial

        </div> -->

    </div>


    <!-- CONTRIBUIÇÃO ONLINE -->

    <div class="card border-danger shadow-sm rounded-4 mb-4">

        <div class="card-body text-center p-4">

            <h5 class="mt-2">

               ❤️ Contribuições Online

            </h5>

            <div class="text-muted mb-3">

                Faça sua contribuição pelo PIX

            </div>

            <div class="d-grid">

                <a
                    href="{{ url_for('contribuicoes.app_contribuicoes') }}"
                    class="btn btn-danger btn-lg rounded-pill">

                    Fazer Contribuição

                </a>

            </div>

        </div>

    </div>


    <!-- ÁREA ADMINISTRATIVA -->

    <div class="card shadow rounded-4">

        <div class="card-body p-4">

            <h5 class="text-center text-primary mb-4">

                🔐 Área Administrativa

            </h5>

            <form method="post">

                <div class="mb-3">

                    <label class="form-label">

                        Comunidade

                    </label>

                    <select
                        name="comunidade_id"
                        class="form-select rounded-3"
                        required>

                        <option value="">

                            Selecione...

                        </option>

                        {% for c in comunidades %}

                        <option value="{{ c.id }}">

                            {{ c.nome }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Senha

                    </label>

                    <input
                        type="password"
                        name="senha"
                        class="form-control rounded-3"
                        required>

                </div>

                <div class="d-grid">

                    <button
                        class="btn btn-primary btn-lg rounded-pill">

                        Entrar

                    </button>

                </div>

            </form>

        </div>

    </div>


    <div class="text-center mt-4">

        <small class="text-muted">

            SGME © 2026

        </small>

    </div>

</div>

{% endblock %}
