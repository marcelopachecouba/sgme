{% extends "base.html" %}
{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Dashboard</h3>
    </div>

    <!-- CARDS SUPERIORES -->
    <div class="row g-4 mb-4">

        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <small class="text-muted">Total Escalas</small>
                    <h2 class="fw-bold mt-2">{{ total_escalas }}</h2>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <small class="text-muted">Confirmadas</small>
                    <h2 class="fw-bold text-success mt-2">{{ confirmadas }}</h2>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <small class="text-muted">Mais Escalado</small>
                    <h6 class="fw-semibold mt-2">{{ mais_escalado }}</h6>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <small class="text-muted">Menos Escalado</small>
                    <h6 class="fw-semibold mt-2">{{ menos_escalado }}</h6>
                </div>
            </div>
        </div>

    </div>

    <!-- GRÁFICOS -->
    <div class="row g-4">

        <div class="col-12 col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h6 class="mb-3">Escalas por Ministro</h6>
                    <img src="data:image/png;base64,{{ grafico_barra }}" class="img-fluid rounded">
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h6 class="mb-3">Distribuição</h6>
                    <img src="data:image/png;base64,{{ grafico_pizza }}" class="img-fluid rounded">
                </div>
            </div>
        </div>

    </div>

</div>

{% endblock %}
