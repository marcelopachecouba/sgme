{% extends "base.html" %}

{% block content %}
<div class="container px-0" style="max-width: 760px;">
    <h2 class="mb-4">Gerar Escala Inteligente</h2>

    <form method="POST" class="card shadow-sm border-0">
        <div class="card-body p-4">
            <div class="row g-3">
                <div class="col-12 col-md-4">
                    <label for="mes" class="form-label">Mes</label>
                    <select id="mes" name="mes" class="form-select" required>
                        {% for i in range(1, 13) %}
                        <option value="{{ i }}">{{ i }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-12 col-md-4">
                    <label for="ano" class="form-label">Ano</label>
                    <input id="ano" type="number" name="ano" value="2026" class="form-control" required>
                </div>
            </div>

            <div class="mt-4">
                <label class="form-label d-block mb-3">Estrategias de geracao</label>
                <div class="row g-2">
                    <div class="col-12 col-md-6">
                        <div class="form-check border rounded p-3 h-100">
                            <input class="form-check-input" type="checkbox" name="ordem_geracao" value="equilibrada" id="ordem_equilibrada" checked>
                            <label class="form-check-label" for="ordem_equilibrada">Equilibrada</label>
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="form-check border rounded p-3 h-100">
                            <input class="form-check-input" type="checkbox" name="ordem_geracao" value="casais_fim_semana" id="ordem_casais_fim_semana">
                            <label class="form-check-label" for="ordem_casais_fim_semana">Casais juntos no fim de semana</label>
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="form-check border rounded p-3 h-100">
                            <input class="form-check-input" type="checkbox" name="ordem_geracao" value="casais_semana" id="ordem_casais_semana">
                            <label class="form-check-label" for="ordem_casais_semana">Casais juntos na semana</label>
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="form-check border rounded p-3 h-100">
                            <input class="form-check-input" type="checkbox" name="ordem_geracao" value="minimo_missas" id="ordem_minimo_missas">
                            <label class="form-check-label" for="ordem_minimo_missas">Menor quantidade de missas primeiro</label>
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="form-check border rounded p-3 h-100">
                            <input class="form-check-input" type="checkbox" name="ordem_geracao" value="semana_primeiro" id="ordem_semana_primeiro">
                            <label class="form-check-label" for="ordem_semana_primeiro">Comecar pela semana</label>
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="form-check border rounded p-3 h-100">
                            <input class="form-check-input" type="checkbox" name="ordem_geracao" value="fim_semana_primeiro" id="ordem_fim_semana_primeiro">
                            <label class="form-check-label" for="ordem_fim_semana_primeiro">Comecar pelo fim de semana</label>
                        </div>
                    </div>
                </div>
                <div class="form-text mt-2">Voce pode marcar mais de uma opcao. O sistema combina as prioridades selecionadas.</div>
            </div>

            <div class="form-check mt-4">
                <input class="form-check-input" type="checkbox" name="considerar_periodos_anteriores" id="considerar_periodos_anteriores">
                <label class="form-check-label" for="considerar_periodos_anteriores">
                    Considerar periodos anteriores no historico
                </label>
            </div>

            <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" name="enviar_escala_ministros" id="enviar_escala_ministros">
                <label class="form-check-label" for="enviar_escala_ministros">
                    Enviar escala do mes para os ministros (confirmar/recusar)
                </label>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success w-100">Gerar Escala Inteligente</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
