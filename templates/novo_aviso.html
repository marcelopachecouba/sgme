{% extends "base.html" %}

{% block content %}

<h3>Novo Aviso / FormańŃo</h3>

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label>TĒtulo</label>
<input type="text" name="titulo" class="form-control" required>
</div>

<div class="mb-3">
<label>Mensagem</label>
<textarea name="mensagem" class="form-control" rows="4" required></textarea>
</div>

<div class="mb-3">
<label>Tipo</label>
<select name="tipo" class="form-control" required>
<option value="aviso">Aviso</option>
<option value="formacao">FormańŃo</option>
<option value="foto">Foto</option>
<option value="video">VĒdeo YouTube</option>
<option value="pdf">Arquivo PDF</option>
</select>
</div>

<div class="mb-3">
<label>Link do vĒdeo YouTube</label>
<input type="text" name="video_url" class="form-control">
</div>

<div class="mb-3">
<label>Arquivo</label>
<input type="file" name="arquivo" class="form-control">
</div>

<div class="form-check mb-3">
<input type="checkbox" name="fixado" class="form-check-input" id="fixado">
<label class="form-check-label" for="fixado">Fixar no topo</label>
</div>

<button class="btn btn-success">Salvar</button>
<a href="{{ url_for('avisos.avisos') }}" class="btn btn-secondary">Cancelar</a>

</form>

{% endblock %}
