<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Escala - SGME</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1f2937">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f3f4f6;
        }

        .topo {
            background-color: #1f2937;
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        .card-escala {
            border-radius: 16px;
            border: none;
        }

        .badge-status {
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 20px;
        }

        .btn-lg {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="topo">
    SGME - Minha Escala
</div>

<div class="container py-4">

    <div class="card shadow card-escala mb-4">
        <div class="card-body text-center">

            <h5 class="fw-bold mb-3">
                {{ missa.data.strftime('%d/%m/%Y') }} - {{ missa.horario }}
            </h5>

            <p class="text-muted mb-2">
                {{ missa.comunidade }}
            </p>

            <p class="mb-2">
                <strong>Ministro:</strong> {{ ministro.nome }}
            </p>

            {% if escala.confirmado %}
                <span class="badge bg-success badge-status">
                    ✔ Confirmado
                </span>
            {% else %}
                <span class="badge bg-warning text-dark badge-status">
                    ⏳ Pendente
                </span>
            {% endif %}

        </div>
    </div>

    <form method="post" class="d-grid gap-3">

        <button name="acao"
                value="confirmar"
                class="btn btn-success btn-lg">
            ✅ Confirmar Presença
        </button>

        <button name="acao"
                value="recusar"
                class="btn btn-danger btn-lg">
            ❌ Não Posso Ir
        </button>


        <button name="acao"
                value="substituicao"
                class="btn btn-outline-primary btn-lg">
            Pedir Substituicao
        </button>
    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
