{% extends "base.html" %}

{% block content %}

<h2>Gerar Escala Mensal Inteligente</h2>

<form method="POST">

    <label>Mês</label>
    <select name="mes" required>
        {% for i in range(1,13) %}
        <option value="{{i}}">{{i}}</option>
        {% endfor %}
    </select>

    <label>Ano</label>
    <input type="number" name="ano" value="2026" required>

    <br><br>

    <button type="submit" class="btn btn-success">
        Gerar Escala Inteligente
    </button>

</form>

{% endblock %}
