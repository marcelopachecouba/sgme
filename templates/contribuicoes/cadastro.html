{% extends "base.html" %}
{% block content %}

<div class="mb-3">

    <a
        href="{{ url_for(request.blueprint + '.inicio') }}"
        class="btn btn-outline-primary">

        🏠 Início do Módulo

    </a>

</div>

<div class="container py-4">
  <div class="card shadow-sm">
    <div class="card-header bg-success text-white">
      <h4 class="mb-0">Cadastro do Contribuinte</h4>
    </div>
    <div class="card-body">
      <form method="post" class="row g-3">
        <div class="col-md-3">
          <label class="form-label">CPF</label>
          <input name="cpf" class="form-control" value="{{ cpf }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Nome</label>
          <input name="nome" class="form-control" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Telefone</label>
          <input name="telefone" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">WhatsApp</label>
          <input name="whatsapp" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">Email</label>
          <input name="email" type="email" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">Comunidade</label>
          <select name="comunidade_id" class="form-select">
            <option value="">Selecione</option>
            {% for c in comunidades %}
              <option value="{{ c.id }}">{{ c.nome }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">CEP</label>
          <input name="cep" class="form-control">
        </div>
        <div class="col-md-5">
          <label class="form-label">Endereco</label>
          <input name="endereco" class="form-control">
        </div>
        <div class="col-md-2">
          <label class="form-label">Numero</label>
          <input name="numero" class="form-control">
        </div>
        <div class="col-md-3">
          <label class="form-label">Bairro</label>
          <input name="bairro" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">Cidade</label>
          <input name="cidade" class="form-control">
        </div>
        <div class="col-12 text-end">
          <button class="btn btn-success">Salvar e continuar</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
