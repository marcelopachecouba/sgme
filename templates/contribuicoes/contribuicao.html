{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <div class="row g-4">
    <div class="col-lg-4">
      <div class="card shadow-sm">
        <div class="card-header bg-light"><strong>Contribuinte</strong></div>
        <div class="card-body">
          <h5>{{ dizimista.nome }}</h5>
          <div class="text-muted">{{ dizimista.cpf }}</div>
          <div>{{ dizimista.comunidade.nome if dizimista.comunidade else "Sem comunidade" }}</div>
          <a class="btn btn-outline-success btn-sm mt-3" href="{{ url_for('contribuicoes.historico', dizimista_id=dizimista.id) }}">Historico</a>
        </div>
      </div>
    </div>
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-header bg-success text-white"><h4 class="mb-0">Nova Contribuicao</h4></div>
        <div class="card-body">
          <form method="post" class="row g-3">
            <div class="col-md-5">
              <label class="form-label">Tipo</label>
              <select name="categoria_codigo" class="form-select" required>
                {% for categoria in categorias %}
                  <option value="{{ categoria.codigo }}">{{ categoria.descricao }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Competencia</label>
              <input name="competencia" type="month" class="form-control">
            </div>
            <div class="col-md-4">
              <label class="form-label">Valor</label>
              <input name="valor" type="number" step="0.01" min="0.01" class="form-control" required>
            </div>
            <div class="col-12">
              <label class="form-label">Descricao</label>
              <input name="descricao" class="form-control">
            </div>
            <div class="col-12 text-end">
              <button class="btn btn-success">Gerar PIX</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
