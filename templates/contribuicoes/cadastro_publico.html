{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Cadastro do Fiel</h3>

</div>

<div class="card-body">

<form method="POST"
      action="{{ url_for('contribuicoes.cadastrar_dizimista') }}">

<div class="row">

<div class="col-md-6">

<label>Nome</label>

<input
class="form-control"
name="nome"
required>

</div>

<div class="col-md-3">

<label>CPF</label>

<input
class="form-control"
name="cpf"
value="{{ cpf }}"
readonly>

</div>

<div class="col-md-3">

<label>Telefone</label>

<input
class="form-control"
name="telefone">

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>Email</label>

<input
class="form-control"
name="email">

</div>

<div class="col-md-6">

<label>Comunidade</label>

<select
class="form-control"
name="comunidade_id">

{% for c in comunidades %}

<option value="{{ c.id }}">

{{ c.nome }}

</option>

{% endfor %}

</select>

</div>

</div>

<br>

<div class="text-center">

<button class="btn btn-success">
Salvar e continuar
</button>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
