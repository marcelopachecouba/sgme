{% if proxima %}

<div class="card shadow-lg border-success mb-4">

<div class="card-body text-center">

<h4 class="text-success">⛪ Próxima Missa</h4>

<h5 class="mt-3">{{ proxima.comunidade }}</h5>

<p class="mb-1">
📅 {{ proxima.data.strftime('%d/%m/%Y') }}
</p>

<p class="mb-2">
⏰ {{ proxima.horario }}
</p>

{% if contagem %}
<div class="alert alert-info mt-3">
⏳ Faltam <strong>{{ contagem }}</strong>
</div>
{% endif %}

<div class="d-grid gap-2 mt-3">

<a href="/checkin/{{ proxima.id }}" class="btn btn-success">
✔ Confirmar presença
</a>

{% if proxima.latitude and proxima.longitude %}
<a href="https://www.google.com/maps?q={{ proxima.latitude }},{{ proxima.longitude }}"
target="_blank"
class="btn btn-outline-primary">
📍 Ver localização
</a>
{% endif %}

</div>

</div>
</div>

{% endif %}
