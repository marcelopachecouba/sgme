{% extends "base.html" %}

{% block content %}

<h2>⚡ Gerar Escala Inteligente do Mês Inteiro</h2>

<form method="POST">

    <label>Mês</label>
    <select name="mes">
        {% for i in range(1,13) %}
        <option value="{{i}}">{{i}}</option>
        {% endfor %}
    </select>

    <br><br>

    <label>Ano</label>
    <input type="number" name="ano" value="2026">

    <br><br>

    <button class="btn btn-success">
        ⚡ Gerar Escala Inteligente
    </button>

</form>

{% endblock %}
