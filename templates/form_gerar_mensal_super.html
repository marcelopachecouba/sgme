{% extends "base.html" %}

{% block content %}

<h2>⚡ Gerar Escala Inteligente do Mês Inteiro</h2>

<form method="POST">

    <label>Mês</label>
    <select name="mes">
        {% for i in range(1,13) %}
        <option value="{{i}}">{{i}}</option>
        {% endfor %}
    </select>

    <br><br>

    <label>Ano</label>
    <input type="number" name="ano" value="2026">

    <br><br>

    <div class="form-check">
        <input class="form-check-input" type="checkbox" name="considerar_periodos_anteriores" id="considerar_periodos_anteriores">
        <label class="form-check-label" for="considerar_periodos_anteriores">
            Considerar periodos anteriores no historico
        </label>
    </div>

    <br><br>

    <button class="btn btn-success">
        ⚡ Gerar Escala Inteligente
    </button>

</form>

{% endblock %}
