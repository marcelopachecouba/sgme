<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SGME</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#1f2937">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
            background-color: #f3f4f6;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #1f2937;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #374151;
        }

        .content-area {
            padding: 20px;
        }

        .navbar-brand {
            font-weight: bold;
        }
    </style>
</head>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
}
</script>


<body>

{% if current_user.is_authenticated %}

<!-- NAVBAR MOBILE -->
<nav class="navbar navbar-dark bg-dark d-md-none">
    <div class="container-fluid">
        <button class="btn btn-outline-light" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
            ☰ Menu
        </button>
        <span class="navbar-brand mb-0 h1">SGME</span>
    </div>
</nav>

<!-- SIDEBAR OFFCANVAS MOBILE -->
<div class="offcanvas offcanvas-start bg-dark text-white" tabindex="-1" id="sidebarMenu">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">SGME</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body sidebar">
        {% include "menu.html" %}
    </div>
</div>

{% endif %}

<div class="container-fluid">
    <div class="row">

        {% if current_user.is_authenticated %}
        <!-- SIDEBAR DESKTOP -->
        <div class="col-md-2 d-none d-md-block sidebar">
            <h5 class="text-white text-center mt-3 mb-4">SGME</h5>
            {% include "menu.html" %}
        </div>
        {% endif %}

        <!-- CONTEÚDO -->
        <div class="{% if current_user.is_authenticated %}col-md-10{% else %}col-12{% endif %} content-area">
            {% block content %}{% endblock %}
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
